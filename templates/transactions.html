<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flinpay — Transactions</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A3CFF;--gold:#FFB400;--green:#00C48C;--black:#0D0D0D;--bg:#F5F6FA;--text:#1A1A2E;--muted:#8A8FA8;--danger:#FF4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;background:var(--black);display:flex;flex-direction:column;z-index:200;transition:transform .3s}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.4rem;color:white;text-decoration:none}
.logo-text span{color:var(--blue)}
.close-sb{display:none;background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.4rem;cursor:pointer}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-group{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:14px 20px 5px}
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 20px;color:rgba(255,255,255,0.45);font-size:0.86rem;font-weight:500;text-decoration:none;border-left:3px solid transparent;transition:all .2s}
.nav-link:hover{color:white;background:rgba(255,255,255,0.04)}
.nav-link.active{color:white;background:rgba(26,60,255,0.15);border-left-color:var(--blue)}
.nav-link .icon{font-size:1rem;width:18px;text-align:center;flex-shrink:0}
.sidebar-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.user-row{display:flex;align-items:center;gap:10px}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.88rem}
.user-name{font-size:0.83rem;font-weight:600;color:white}
.user-email{font-size:0.7rem;color:rgba(255,255,255,0.3)}
.logout-link{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.25);font-size:0.78rem;padding:10px 20px 14px;text-decoration:none;border-top:1px solid rgba(255,255,255,0.04)}
.logout-link:hover{color:#ff7070}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
.overlay.show{display:block}
.main{margin-left:250px;min-height:100vh}
.topbar{background:white;border-bottom:1px solid #E8EAF0;padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.burger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px}
.burger-line{width:22px;height:2px;background:var(--text);border-radius:2px;display:block}
.page-title{font-size:1rem;font-weight:700}
.content{padding:28px}
.card{background:white;border-radius:14px;border:1px solid #E8EAF0;overflow:hidden;margin-bottom:18px}
.card-head{padding:16px 22px;border-bottom:1px solid #F0F2F7;display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:0.9rem;font-weight:700}
.btn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.84rem;padding:9px 18px;border-radius:9px;border:none;cursor:pointer}
.btn-primary{background:var(--blue);color:white}
.btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue)}
.btn-sm{padding:6px 14px;font-size:0.76rem}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-input{padding:9px 14px;border:1.5px solid #E0E2EC;border-radius:9px;font-size:0.85rem;background:white}
.filter-select{padding:9px 14px;border:1.5px solid #E0E2EC;border-radius:9px;font-size:0.85rem;background:white}
.tbl{width:100%;border-collapse:collapse;font-size:0.83rem}
.tbl th{padding:9px 14px;text-align:left;font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;background:#FAFBFF;border-bottom:1px solid #F0F2F7}
.tbl td{padding:12px 14px;border-bottom:1px solid #F8F9FB}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:0.7rem;font-weight:700}
.b-success{background:#D4F5E9;color:#0A7A50}
.b-pending{background:#FFF3CC;color:#856404}
.b-failed{background:#F5D4D4;color:#7A0A0A}
.tx-id{font-family:monospace;font-size:0.76rem;color:var(--muted)}
.tx-amt{font-family:'Space Grotesk',sans-serif;font-weight:700}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.burger{display:flex}.close-sb{display:block}.content{padding:16px}}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSB()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/dashboard" class="logo-text">Flin<span>pay</span></a>
    <button class="close-sb" onclick="closeSB()">✕</button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">Principal</div>
    <a class="nav-link" href="/dashboard"><span class="icon">📊</span> Vue d'ensemble</a>
    <a class="nav-link active" href="/transactions"><span class="icon">💳</span> Transactions</a>
    <a class="nav-link" href="/payouts"><span class="icon">📤</span> Payouts</a>
    <a class="nav-link" href="/payment-links"><span class="icon">🔗</span> Liens de paiement</a>
    <div class="nav-group">Développeur</div>
    <a class="nav-link" href="/api-keys"><span class="icon">🔑</span> Clés API</a>
    <a class="nav-link" href="/webhooks"><span class="icon">🪝</span> Webhooks</a>
    <a class="nav-link" href="/sandbox"><span class="icon">🧪</span> Sandbox</a>
    <div class="nav-group">Compte</div>
    <a class="nav-link" href="/profile"><span class="icon">👤</span> Profil</a>
    <a class="nav-link" href="/billing"><span class="icon">💰</span> Facturation</a>
    <a class="nav-link" href="/referral"><span class="icon">🎁</span> Parrainage</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-row">
      <div class="user-av">U</div>
      <div><div class="user-name">Utilisateur</div><div class="user-email">—</div></div>
    </div>
  </div>
  <a class="logout-link" href="/login">🚪 Déconnexion</a>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="burger" onclick="openSB()"><span class="burger-line"></span><span class="burger-line"></span><span class="burger-line"></span></button>
      <div class="page-title">💳 Transactions</div>
    </div>
  </div>
  <div class="content">
    <div class="filter-bar">
      <input class="filter-input" type="text" id="tx-search" placeholder="Rechercher..." oninput="filterTx()">
      <select class="filter-select" id="tx-status" onchange="filterTx()">
        <option value="">Tous les statuts</option>
        <option value="paid">Payé</option>
        <option value="pending">En attente</option>
        <option value="failed">Échoué</option>
      </select>
      <select class="filter-select" id="tx-country" onchange="filterTx()">
        <option value="">Tous les pays</option>
        <option value="CI">Côte d'Ivoire</option>
        <option value="CM">Cameroun</option>
        <option value="SN">Sénégal</option>
        <option value="BJ">Bénin</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="exportTx()">Exporter CSV</button>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">Transactions <span id="tx-total" style="color:var(--muted);font-weight:400"></span></div>
        <button class="btn btn-primary btn-sm" onclick="loadTransactions()">Actualiser</button>
      </div>
      <div style="overflow-x:auto">
        <table class="tbl" id="tx-table">
          <thead><tr><th>ID</th><th>Client</th><th>Montant</th><th>Statut</th><th>Opérateur</th><th>Date</th></tr></thead>
          <tbody id="tx-tbody">
            <tr><td colspan="6"><div class="empty">Aucune transaction</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

var allTx=[];
function loadTransactions(){
  allTx=[
    {id:'fp_tx_abc123',client:'Kouamé D.',amount:15000,status:'paid',operator:'Orange Money',country:'CI',date:'2025-06-29 10:23'},
    {id:'fp_tx_def456',client:'Aminata S.',amount:8500,status:'pending',operator:'Wave',country:'SN',date:'2025-06-29 09:15'},
    {id:'fp_tx_ghi789',client:'Ibrahim T.',amount:25000,status:'paid',operator:'MTN MoMo',country:'CM',date:'2025-06-28 16:44'},
    {id:'fp_tx_jkl012',client:'Fatou B.',amount:5000,status:'failed',operator:'Moov Money',country:'BJ',date:'2025-06-28 14:30'}
  ];
  renderTx(allTx);
}
function renderTx(txs){
  var tbody=document.getElementById('tx-tbody');
  document.getElementById('tx-total').textContent='('+txs.length+')';
  if(!txs.length){tbody.innerHTML='<tr><td colspan="6"><div class="empty">Aucune transaction</div></td></tr>';return}
  var html='';
  for(var i=0;i<txs.length;i++){
    var tx=txs[i];
    var badge=tx.status==='paid'?'b-success':(tx.status==='pending'?'b-pending':'b-failed');
    var label=tx.status==='paid'?'Payé':(tx.status==='pending'?'Attente':'Échoué');
    html+='<tr><td><span class="tx-id">'+tx.id.substr(0,12)+'...</span></td><td>'+tx.client+'</td><td><span class="tx-amt">'+tx.amount.toLocaleString()+' XOF</span></td><td><span class="badge '+badge+'">'+label+'</span></td><td>'+tx.operator+'</td><td style="font-size:0.76rem;color:var(--muted)">'+tx.date+'</td></tr>';
  }
  tbody.innerHTML=html;
}
function filterTx(){
  var search=document.getElementById('tx-search').value.toLowerCase();
  var status=document.getElementById('tx-status').value;
  var country=document.getElementById('tx-country').value;
  var filtered=allTx.filter(function(tx){
    var matchSearch=!search||tx.client.toLowerCase().indexOf(search)!==-1||tx.id.indexOf(search)!==-1;
    var matchStatus=!status||tx.status===status;
    var matchCountry=!country||tx.country===country;
    return matchSearch&&matchStatus&&matchCountry;
  });
  renderTx(filtered);
}
function exportTx(){
  var rows=['ID,Client,Montant,Statut,Operateur,Date'];
  for(var i=0;i<allTx.length;i++){
    var t=allTx[i];
    rows.push(t.id+','+t.client+','+t.amount+','+t.status+','+t.operator+','+t.date);
  }
  var csv=rows.join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='transactions_flinpay.csv';
  a.click();
}
loadTransactions();
</script>
</body>
</html>
